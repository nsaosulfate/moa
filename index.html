<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f4f4f1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="모아">
<meta name="description" content="내가 만든 사이트를 한 곳에서 — 모아(moa) 허브">
<script>
/* 깜빡임 없이 테마 먼저 적용 (앱들과 동일한 패턴) */
(function(){
  try{
    var t = localStorage.getItem("hub-theme")
      || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    document.documentElement.dataset.theme = t;
  }catch(e){}
})();
</script>
<title>모아 · moa — 내 사이트 모음</title>
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='16' fill='%234f46e5'/><g fill='white'><rect x='16' y='16' width='13' height='13' rx='3'/><rect x='35' y='16' width='13' height='13' rx='3'/><rect x='16' y='35' width='13' height='13' rx='3'/><rect x='35' y='35' width='13' height='13' rx='3'/></g></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tagalog&family=Noto+Sans+JP:wght@500&display=swap" rel="stylesheet">
<style>
/* ════════ 디자인 토큰 — haru/kanade/baybayin 공통 시스템 그대로 ════════ */
:root{
  --bg:#f4f4f1; --card:#ffffff; --ink:#191b22; --sub:#8a8d99;
  --line:#e8e8ed; --accent:#4f46e5; --accent2:#7c6cf0; --accent-soft:#eef0ff;
  --green:#2f9e63; --red:#d64545; --amber:#e6920b;
  --seg-bg:#e9e9ec; --switch-off:#d8d8dd; --input-bg:#fafafc; --track:#e7e7ec;
  --green-soft:#e7f6ee; --red-soft:#fdeaea; --hint-fg:#bfc1cc;
  --shadow:0 1px 2px rgba(16,18,28,.04), 0 10px 28px rgba(16,18,28,.07);
  color-scheme:light;
}
html[data-theme="dark"]{
  --bg:#111219; --card:#1b1d27; --ink:#e9eaf0; --sub:#9094a6;
  --line:#2b2e3c; --accent:#8a8df8; --accent2:#a8a3ff; --accent-soft:#272a4a;
  --green:#41b97c; --red:#ef6e6e; --amber:#f3b13e;
  --seg-bg:#252734; --switch-off:#3c3f4e; --input-bg:#14151d; --track:#2b2e3c;
  --green-soft:#1d3a2a; --red-soft:#41232a; --hint-fg:#585d72;
  --shadow:0 1px 2px rgba(0,0,0,.4), 0 10px 28px rgba(0,0,0,.45);
  color-scheme:dark;
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ height:100%; }
body{
  margin:0;
  font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;
  background:var(--bg); color:var(--ink);
  letter-spacing:-0.01em; -webkit-text-size-adjust:100%;
  overscroll-behavior-y:contain;
}
button{ font-family:inherit; color:inherit; }
button,.site-card,.pill,.tab{ touch-action:manipulation; -webkit-user-select:none; user-select:none; }
a{ color:inherit; }
.hidden{ display:none !important; }
.wrap{
  max-width:860px; margin:0 auto;
  padding:max(22px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right))
          calc(40px + env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
}

/* ───── 앱바 ───── */
.appbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.appbar .logo{ display:flex; align-items:center; gap:10px; font-size:19px; font-weight:800; letter-spacing:-0.02em; }
.logo-mark{
  display:inline-flex; align-items:center; justify-content:center;
  width:36px; height:36px; border-radius:11px;
  background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff;
  font-size:18px; font-weight:800; box-shadow:0 4px 12px rgba(79,70,229,.32); flex:0 0 auto;
}
.logo small{ font-weight:600; color:var(--sub); font-size:12px; margin-left:1px; }
.icon-btn{
  background:var(--card); color:var(--sub); cursor:pointer;
  width:42px; height:42px; border-radius:12px; font-size:17px;
  border:1px solid var(--line); flex:0 0 auto;
}

/* ───── 히어로 ───── */
.hero{ margin:18px 2px 18px; }
.hero-greet{ font-size:26px; font-weight:800; letter-spacing:-0.03em; line-height:1.3; }
.hero-sub{ color:var(--sub); font-size:14.5px; margin-top:6px; }

/* ───── 검색 + 태그 ───── */
.toolbar{ display:flex; gap:10px; align-items:center; margin-bottom:14px; }
.search{
  flex:1; display:flex; align-items:center; gap:8px;
  background:var(--card); border:1.5px solid var(--line); border-radius:14px; padding:0 14px;
}
.search input{
  flex:1; border:none; background:transparent; color:var(--ink);
  font-size:15px; font-family:inherit; padding:13px 0; outline:none;
}
.search .s-ic{ color:var(--sub); font-size:16px; }
.pill-row{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px; }
.pill{
  border:1.5px solid var(--line); background:var(--card); border-radius:999px;
  padding:8px 14px; font-size:13px; font-weight:700; color:var(--sub); cursor:pointer; transition:all .12s;
}
.pill.on{ border-color:var(--accent); color:var(--accent); background:var(--accent-soft); }

/* ───── 사이트 그리드 ───── */
.grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(248px,1fr)); gap:13px; }
.site-card{
  position:relative; display:flex; align-items:center; gap:14px;
  background:var(--card); border:1px solid var(--line); border-radius:20px;
  padding:17px 16px; box-shadow:var(--shadow); transition:transform .09s, box-shadow .15s, border-color .15s;
  overflow:hidden;
}
.site-card:hover{ border-color:color-mix(in srgb, var(--accent) 40%, var(--line)); box-shadow:0 2px 6px rgba(16,18,28,.06), 0 14px 32px rgba(16,18,28,.1); }
.site-card:active{ transform:scale(.985); }
.card-hit{ position:absolute; inset:0; z-index:1; }            /* 카드 전체가 링크 */
.site-card > *:not(.card-hit){ position:relative; z-index:2; pointer-events:none; }
.tile{
  width:50px; height:50px; border-radius:14px; flex:0 0 auto;
  display:flex; align-items:center; justify-content:center;
  font-size:24px; font-weight:800; color:#fff; line-height:1;
  box-shadow:0 4px 12px rgba(0,0,0,.16);
}
.card-body{ flex:1; min-width:0; }
.c-name{ font-size:16px; font-weight:800; letter-spacing:-0.02em; display:flex; align-items:baseline; gap:6px; flex-wrap:wrap; }
.c-name small{ font-size:11.5px; font-weight:600; color:var(--sub); }
.c-desc{ font-size:12.5px; color:var(--sub); margin-top:3px; line-height:1.45; }
.c-tags{ display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; }
.tag{ font-size:10.5px; font-weight:700; color:var(--sub); background:var(--seg-bg); border-radius:999px; padding:3px 9px; }
.card-go{ margin-left:auto; font-size:22px; color:var(--hint-fg); flex:0 0 auto; align-self:center; }
.local-badge{ position:absolute; top:10px; right:38px; font-size:9.5px; font-weight:800; color:var(--accent); background:var(--accent-soft); border-radius:999px; padding:2px 7px; }
.card-x{
  position:absolute; top:8px; right:8px; z-index:3 !important; pointer-events:auto !important;
  width:24px; height:24px; border-radius:8px; border:1px solid var(--line);
  background:var(--card); color:var(--sub); font-size:15px; line-height:1; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.card-x:hover{ color:var(--red); border-color:var(--red); }

/* 추가 카드 */
.add-card{
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:7px;
  background:transparent; border:1.5px dashed var(--line); border-radius:20px;
  padding:17px 16px; min-height:88px; cursor:pointer; color:var(--sub);
  font-size:13.5px; font-weight:700; transition:all .12s;
}
.add-card:hover{ border-color:var(--accent); color:var(--accent); background:var(--accent-soft); }
.add-card .ac-plus{ font-size:24px; font-weight:600; line-height:1; }

.empty-msg{ grid-column:1/-1; text-align:center; color:var(--sub); font-size:14px; padding:40px 12px; line-height:1.8; }

/* 카운트 라인 */
.count-line{ font-size:12px; font-weight:800; color:var(--sub); letter-spacing:.08em; margin:0 2px 10px; text-transform:uppercase; }

footer{ text-align:center; color:var(--sub); font-size:12px; margin-top:34px; line-height:1.7; }

/* ───── 바텀시트 (앱들과 동일) ───── */
.sheet-wrap{ position:fixed; inset:0; z-index:60; display:flex; align-items:flex-end; justify-content:center; }
.sheet-backdrop{ position:absolute; inset:0; background:rgba(10,12,20,.45); animation:fade .2s ease; }
.sheet{
  position:relative; width:100%; max-width:520px; background:var(--card);
  border-radius:24px 24px 0 0; max-height:90vh; overflow-y:auto;
  padding:10px 18px calc(24px + env(safe-area-inset-bottom));
  box-shadow:0 -10px 40px rgba(0,0,0,.25); animation:slideup .28s cubic-bezier(.2,.8,.2,1);
}
.sheet-grip{ width:42px; height:5px; border-radius:99px; background:var(--line); margin:4px auto 14px; }
.sheet h3{ font-size:18px; font-weight:800; margin:2px 2px 4px; }
.sheet .sub{ font-size:12.5px; color:var(--sub); margin:0 2px 16px; line-height:1.6; }
@keyframes slideup{ from{ transform:translateY(100%); } to{ transform:none; } }
@keyframes fade{ from{ opacity:0; } to{ opacity:1; } }

/* 폼 */
.field{ margin-bottom:13px; }
.field label{ display:block; font-size:12px; font-weight:800; color:var(--sub); margin:0 2px 7px; }
.input{
  width:100%; border:1.5px solid var(--line); background:var(--input-bg); color:var(--ink);
  border-radius:13px; padding:12px 14px; font-size:15px; font-family:inherit;
}
.input:focus{ outline:none; border-color:var(--accent); }
.row2{ display:flex; gap:10px; } .row2 .field{ flex:1; }
.color-field{ display:flex; align-items:center; gap:10px; }
.color-field input[type=color]{ width:46px; height:46px; padding:0; border:1.5px solid var(--line); border-radius:12px; background:var(--card); cursor:pointer; flex:0 0 auto; }
.btn{ display:block; width:100%; border:none; border-radius:14px; cursor:pointer; font-size:16px; font-weight:700; padding:15px; transition:transform .08s, opacity .15s; }
.btn:active{ transform:scale(.98); }
.btn-accent{ background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; box-shadow:0 6px 18px rgba(79,70,229,.3); }
.btn-ghost{ background:var(--card); color:var(--ink); border:1.5px solid var(--line); margin-top:10px; }
.preview-wrap{ margin:4px 0 16px; }
.preview-wrap .lbl{ font-size:12px; font-weight:800; color:var(--sub); margin:0 2px 8px; }
.snippet{
  margin-top:12px; background:var(--input-bg); border:1px solid var(--line); border-radius:13px;
  padding:12px 14px; font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  font-size:12px; line-height:1.6; color:var(--ink); white-space:pre-wrap; word-break:break-all;
}
.toast{
  position:fixed; left:50%; bottom:calc(28px + env(safe-area-inset-bottom)); transform:translateX(-50%);
  background:var(--ink); color:var(--bg); font-size:13.5px; font-weight:700;
  padding:12px 20px; border-radius:999px; z-index:90; box-shadow:0 8px 24px rgba(0,0,0,.3);
  opacity:0; pointer-events:none; transition:opacity .2s, transform .2s;
}
.toast.show{ opacity:1; transform:translateX(-50%) translateY(-4px); }
</style>
</head>
<body>
<div class="wrap">

  <div class="appbar">
    <div class="logo"><span class="logo-mark">◈</span>모아<small>moa</small></div>
    <button class="icon-btn theme-btn" title="테마 전환">🌙</button>
  </div>

  <div class="hero">
    <div class="hero-greet">내가 만든 사이트,<br>한 곳에서 🗂️</div>
    <div class="hero-sub">카드를 눌러 바로 들어가요. 새 사이트는 우측 하단에서 추가.</div>
  </div>

  <div class="toolbar">
    <div class="search">
      <span class="s-ic">🔍</span>
      <input id="search" type="search" placeholder="사이트·태그 검색" autocomplete="off">
    </div>
  </div>
  <div class="pill-row" id="tagbar"></div>

  <div class="count-line" id="count-line"></div>
  <div class="grid" id="grid"></div>

  <footer>
    모아 · moa — 사이트 추가는 <b>sites.js</b> 파일 또는 화면의 “＋ 사이트 추가” 버튼으로.
  </footer>

</div>

<!-- ═════════ 사이트 추가 시트 ═════════ -->
<div class="sheet-wrap hidden" id="sheet-wrap">
  <div class="sheet-backdrop" id="sheet-backdrop"></div>
  <div class="sheet">
    <div class="sheet-grip"></div>
    <h3>사이트 추가</h3>
    <p class="sub">아래를 채우면 미리보기가 바뀌고, 맨 아래 <b>sites.js에 붙여넣을 코드</b>가 자동 생성돼요.<br>“이 기기에 바로 추가”를 누르면 지금 화면에서 즉시 보입니다(이 브라우저에만 저장).</p>

    <div class="preview-wrap">
      <div class="lbl">미리보기</div>
      <div class="grid" style="grid-template-columns:1fr;"><div id="preview"></div></div>
    </div>

    <div class="field"><label>이름 *</label><input class="input" id="f-name" placeholder="예: 하루"></div>
    <div class="row2">
      <div class="field"><label>부제 · 영문명</label><input class="input" id="f-sub" placeholder="Haru"></div>
      <div class="field"><label>아이콘 (글자·이모지)</label><input class="input" id="f-icon" placeholder="하" maxlength="3"></div>
    </div>
    <div class="field"><label>설명</label><input class="input" id="f-desc" placeholder="한 줄 설명"></div>
    <div class="field"><label>주소 (URL) *</label><input class="input" id="f-url" placeholder="https://..." inputmode="url"></div>
    <div class="row2">
      <div class="field"><label>대표 색</label>
        <div class="color-field"><input type="color" id="f-color" value="#4f46e5"><input class="input" id="f-color-hex" value="#4f46e5"></div>
      </div>
      <div class="field"><label>그라데이션 끝 색 (선택)</label>
        <div class="color-field"><input type="color" id="f-color2" value="#7c6cf0"><input class="input" id="f-color2-hex" placeholder="없으면 비움"></div>
      </div>
    </div>
    <div class="field"><label>태그 (쉼표로 구분)</label><input class="input" id="f-tags" placeholder="일본어, 암기, 플래시카드"></div>
    <div class="field"><label>특수 폰트 (선택 · 아이콘 글자가 안 보일 때만)</label><input class="input" id="f-font" placeholder="'Noto Sans Tagalog', sans-serif"></div>

    <div class="lbl" style="font-size:12px;font-weight:800;color:var(--sub);margin:6px 2px 0;">sites.js 에 붙여넣을 코드</div>
    <pre class="snippet" id="snippet"></pre>

    <button class="btn btn-accent" id="btn-copy" style="margin-top:14px;">📋 코드 복사</button>
    <button class="btn btn-ghost" id="btn-addlocal">＋ 이 기기에 바로 추가</button>
    <button class="btn btn-ghost" id="btn-cancel">닫기</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="sites.js"></script>
<script>
/* ════════ 유틸 ════════ */
const $  = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];
const LS_THEME = "hub-theme", LS_CUSTOM = "hub-custom-sites";
const esc = s => String(s==null?"":s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const slug = s => String(s||"").trim().toLowerCase().replace(/[^a-z0-9가-힣]+/g,"-").replace(/^-|-$/g,"") || ("site-"+Date.now().toString(36));

/* ════════ 테마 ════════ */
function setTheme(t){
  document.documentElement.dataset.theme = t;
  try{ localStorage.setItem(LS_THEME, t); }catch(e){}
  const m = $('meta[name="theme-color"]'); if(m) m.content = (t==="dark"?"#111219":"#f4f4f1");
  $$(".theme-btn").forEach(b => b.textContent = (t==="dark" ? "☀️" : "🌙"));
}
$$(".theme-btn").forEach(b => b.addEventListener("click", () =>
  setTheme(document.documentElement.dataset.theme==="dark" ? "light" : "dark")));
setTheme(document.documentElement.dataset.theme || "light");

/* ════════ 데이터 (config + 로컬 추가) ════════ */
function customSites(){ try{ return JSON.parse(localStorage.getItem(LS_CUSTOM)) || []; }catch(e){ return []; } }
function saveCustom(arr){ try{ localStorage.setItem(LS_CUSTOM, JSON.stringify(arr)); }catch(e){} }
function allSites(){
  const base = (window.SITES || []).map(s => ({ ...s, _local:false }));
  const cust = customSites().map(s => ({ ...s, _local:true }));
  return [...base, ...cust];
}

let activeTag = "", query = "";

/* ════════ 카드 렌더 ════════ */
function tileStyle(s){
  const bg = s.color2 ? `linear-gradient(135deg,${s.color||"#4f46e5"},${s.color2})` : (s.color || "#4f46e5");
  return `background:${bg};` + (s.font ? `font-family:${s.font};` : "");
}
function cardHTML(s){
  const tags = (s.tags||[]).map(t => `<span class="tag">${esc(t)}</span>`).join("");
  const url  = /^https?:\/\//i.test(s.url||"") ? s.url : ("https://" + (s.url||""));
  return `<div class="site-card">
    <a class="card-hit" href="${esc(url)}" aria-label="${esc(s.name)} 열기"></a>
    <div class="tile" style="${tileStyle(s)}">${esc(s.icon||"•")}</div>
    <div class="card-body">
      <div class="c-name">${esc(s.name||"제목 없음")}${s.sub?` <small>${esc(s.sub)}</small>`:""}</div>
      ${s.desc?`<div class="c-desc">${esc(s.desc)}</div>`:""}
      ${tags?`<div class="c-tags">${tags}</div>`:""}
    </div>
    <span class="card-go">›</span>
    ${s._local?`<span class="local-badge">로컬</span><button class="card-x" data-x="${esc(s.id)}" title="목록에서 삭제">×</button>`:""}
  </div>`;
}

function render(){
  const sites = allSites();

  /* 태그바 */
  const tags = [...new Set(sites.flatMap(s => s.tags || []))];
  $("#tagbar").innerHTML =
    `<button class="pill ${activeTag===""?"on":""}" data-tag="">전체</button>` +
    tags.map(t => `<button class="pill ${activeTag===t?"on":""}" data-tag="${esc(t)}">${esc(t)}</button>`).join("");

  /* 필터 */
  const q = query.trim().toLowerCase();
  const list = sites.filter(s => {
    if(activeTag && !(s.tags||[]).includes(activeTag)) return false;
    if(q){
      const hay = (s.name+" "+(s.sub||"")+" "+(s.desc||"")+" "+(s.tags||[]).join(" ")).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });

  $("#count-line").textContent = `사이트 ${sites.length}개` + (activeTag||q ? ` · ${list.length}개 표시 중` : "");

  $("#grid").innerHTML =
    (list.length ? list.map(cardHTML).join("") : `<div class="empty-msg">조건에 맞는 사이트가 없어요 🔍</div>`)
    + `<button class="add-card" id="add-card"><span class="ac-plus">＋</span>사이트 추가</button>`;

  /* 바인딩 */
  $$("#tagbar [data-tag]").forEach(b => b.onclick = () => { activeTag = b.dataset.tag; render(); });
  $$(".card-x").forEach(b => b.onclick = e => {
    e.preventDefault(); e.stopPropagation();
    if(confirm("이 사이트를 목록에서 지울까요? (이 기기에 추가한 항목만 삭제됩니다)")){
      saveCustom(customSites().filter(x => x.id !== b.dataset.x)); render();
    }
  });
  $("#add-card").onclick = openSheet;
}

$("#search").addEventListener("input", e => { query = e.target.value; render(); });

/* ════════ 사이트 추가 시트 ════════ */
const sheet = $("#sheet-wrap");
function openSheet(){ sheet.classList.remove("hidden"); document.body.style.overflow="hidden"; syncPreview(); }
function closeSheet(){ sheet.classList.add("hidden"); document.body.style.overflow=""; }
$("#sheet-backdrop").onclick = closeSheet;
$("#btn-cancel").onclick = closeSheet;

/* 색상 picker ↔ hex 동기화 */
function linkColor(pick, hex){
  $(pick).addEventListener("input", () => { $(hex).value = $(pick).value; syncPreview(); });
  $(hex).addEventListener("input", () => { if(/^#?[0-9a-fA-F]{6}$/.test($(hex).value.replace("#",""))){ $(pick).value = $(hex).value.startsWith("#")?$(hex).value:"#"+$(hex).value; } syncPreview(); });
}
linkColor("#f-color","#f-color-hex");
linkColor("#f-color2","#f-color2-hex");

function readForm(){
  const name = $("#f-name").value.trim();
  const tags = $("#f-tags").value.split(",").map(t=>t.trim()).filter(Boolean);
  const color2hex = $("#f-color2-hex").value.trim();
  const s = {
    id: slug(name) ,
    name,
    sub: $("#f-sub").value.trim(),
    desc: $("#f-desc").value.trim(),
    url: $("#f-url").value.trim(),
    icon: $("#f-icon").value.trim() || (name ? name[0] : "•"),
    color: ($("#f-color-hex").value.trim() || "#4f46e5"),
    color2: color2hex || "",
    tags,
    font: $("#f-font").value.trim()
  };
  return s;
}

function snippet(s){
  const q = v => `"${String(v||"").replace(/\\/g,"\\\\").replace(/"/g,'\\"')}"`;
  const parts = [`id: ${q(s.id)}`, `name: ${q(s.name)}`];
  if(s.sub) parts.push(`sub: ${q(s.sub)}`);
  if(s.desc) parts.push(`desc: ${q(s.desc)}`);
  parts.push(`url: ${q(s.url)}`, `icon: ${q(s.icon)}`, `color: ${q(s.color)}`);
  if(s.color2) parts.push(`color2: ${q(s.color2)}`);
  parts.push(`tags: [${(s.tags||[]).map(q).join(", ")}]`);
  if(s.font) parts.push(`font: ${q(s.font)}`);
  return `  {\n    ${parts.join(",\n    ")}\n  },`;
}

function syncPreview(){
  const s = readForm();
  $("#preview").innerHTML = cardHTML({ ...s, name: s.name || "이름", desc: s.desc || "설명이 여기에 표시돼요" });
  $("#snippet").textContent = snippet(s);
}
["f-name","f-sub","f-icon","f-desc","f-url","f-tags","f-font"].forEach(id =>
  $("#"+id).addEventListener("input", syncPreview));

function toast(msg){
  const t = $("#toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove("show"), 1900);
}

$("#btn-copy").onclick = async () => {
  const code = snippet(readForm());
  try{ await navigator.clipboard.writeText(code); toast("코드를 복사했어요 — sites.js에 붙여넣으세요"); }
  catch(e){
    const ta = document.createElement("textarea"); ta.value = code; document.body.appendChild(ta);
    ta.select(); try{ document.execCommand("copy"); toast("코드를 복사했어요"); }catch(_){ toast("복사 실패 — 코드를 직접 선택하세요"); }
    ta.remove();
  }
};

$("#btn-addlocal").onclick = () => {
  const s = readForm();
  if(!s.name){ toast("이름을 입력하세요"); return; }
  if(!s.url){ toast("주소(URL)를 입력하세요"); return; }
  const cust = customSites();
  let id = s.id, n = 2; while([...(window.SITES||[]), ...cust].some(x => x.id === id)){ id = s.id + "-" + (n++); }
  cust.push({ ...s, id });
  saveCustom(cust);
  closeSheet();
  // 폼 초기화
  ["f-name","f-sub","f-icon","f-desc","f-url","f-tags","f-font","f-color2-hex"].forEach(i => $("#"+i).value="");
  render();
  toast("추가했어요 ✓ (이 기기에 저장)");
};

/* 첫 렌더 */
render();
</script>
</body>
</html>
